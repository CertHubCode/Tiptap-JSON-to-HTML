<span style="display: inline-block; vertical-align: top; margin-right: 12px;">{% if node.attrs.fieldName %}<span style="font-weight: bold; display: block; margin-bottom: 0.2em; font-size: 10pt; color: #160047;">{{ node.attrs.fieldName }}</span>{% endif %}<span class="selectField">{% if node.attrs.fieldValue %}{% for option in node.attrs.options %}{% if option.value == node.attrs.fieldValue %}{{ option.label }}{% endif %}{% endfor %}{% else %}{{ node.attrs.defaultValue }}{% endif %}</span></span>
