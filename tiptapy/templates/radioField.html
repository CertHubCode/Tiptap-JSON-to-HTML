<span style="display: block; margin-bottom: 0.3em; font-size: 8.5pt; color: #6b7280;">{{
    node.attrs.fieldName }}</span>
<div class="radioField"
    style="display: flex; flex-direction: {{ 'row' if node.attrs.orientation == 'horizontal' else 'column' }}; flex-wrap: wrap; align-items: {{ 'center' if node.attrs.orientation == 'horizontal' else 'flex-start' }}; gap: {{ '16px' if node.attrs.orientation == 'horizontal' else '6px' }};">
    {% for option in node.attrs.options %}
    <div class="radioField-option" style="display: flex; flex-direction: row; align-items: center; gap: 8px;">
        <input class="radioField-option-input" type="radio" {%if node.attrs.fieldValue %} {% if
            option.value==node.attrs.fieldValue %}checked{% endif %} {% else %} {% if
            option.value==node.attrs.defaultValue %}checked{% endif %} {% endif %} />
        <label class="radioField-option-label" style="white-space: nowrap;">{{
            option.label }}</label>
    </div>
    {% endfor %}
</div>
