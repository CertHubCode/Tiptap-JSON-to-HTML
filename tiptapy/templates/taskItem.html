<label class="task-item" style="display: flex; align-items: center; gap: 8px;">
  <span class="checkbox {% if node.attrs.checked %}checkbox--checked{% endif %}"></span>
  <span class="task-item-label" style="font-size: 12px;">
    {%- for content in node.content -%}
    {%- with template=content.type + '.html', node=content -%}
    {%- include template -%}
    {%- endwith -%}
    {%- endfor -%}
  </span>
</label>
